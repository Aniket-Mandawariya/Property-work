<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PropertyWorks | Property Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-soft">
    <nav class="navbar navbar-expand-lg fixed-top site-navbar scrolled">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4 text-white" href="index.html">PropertyWorks</a>
        <div class="d-flex gap-2">
          <a href="admin.html" class="btn btn-outline-light">Admin Panel</a>
          <a href="index.html" class="btn btn-accent">Back to Home</a>
        </div>
      </div>
    </nav>

    <header class="pt-5 mt-5 pb-3">
      <div class="container pt-4">
        <p class="text-uppercase small text-primary fw-semibold mb-2 reveal-up">Property Inventory</p>
        <h1 class="fw-bold mb-2 reveal-up">Available Business Properties</h1>
        <p class="text-muted mb-0 reveal-up">Explore selected commercial, industrial, and retail spaces.</p>
      </div>
    </header>

    <main class="pb-5">
      <section class="container">
        <div class="property-toolbar reveal-up mb-4">
          <div class="row g-3 align-items-end">
            <div class="col-lg-5">
              <label for="propertySearch" class="form-label fw-semibold mb-1">Search Property</label>
              <input
                type="search"
                id="propertySearch"
                class="form-control"
                placeholder="Search by property name or location"
              />
            </div>
            <div class="col-lg-4">
              <label for="propertyTypeFilter" class="form-label fw-semibold mb-1">Property Type</label>
              <select id="propertyTypeFilter" class="form-select">
                <option value="all">All Types</option>
                <option value="office">Office</option>
                <option value="industrial">Industrial</option>
                <option value="retail">Retail</option>
                <option value="mixed-use">Mixed-Use</option>
                <option value="land">Land</option>
              </select>
            </div>
            <div class="col-lg-3">
              <div class="d-flex gap-2">
                <button type="button" id="propertySearchBtn" class="btn btn-accent w-50">Search</button>
                <button type="button" id="propertyFilterBtn" class="btn btn-outline-dark w-50">Filter</button>
              </div>
            </div>
          </div>
          <p class="text-muted small mt-2 mb-0">
            Showing <span id="propertyVisibleCount">0</span> of <span id="propertyTotalCount">0</span> properties
          </p>
        </div>
        <div id="propertyStatus" class="property-status">Loading properties...</div>
        <div class="row g-4" id="propertyGrid"></div>
      </section>
    </main>

    <button id="backToTopBtn" class="back-to-top" type="button" aria-label="Back to top">↑</button>

    <footer class="py-4 bg-dark text-center text-white-50">
      <div class="container">
        <small>Copyright <span id="year"></span> PropertyWorks. All rights reserved.</small>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="property-page.js"></script>
  </body>
</html>
